<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Coffee Central logo</title>
  <desc id="logoDesc">Round emblem with coffee cup, steam, and coffee bean details in dark chocolate tones.</desc>
  <defs>
    <linearGradient id="bgGrad" x1="34" y1="20" x2="206" y2="222" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3A2418"/>
      <stop offset="1" stop-color="#1A110C"/>
    </linearGradient>
    <linearGradient id="cupGrad" x1="76" y1="102" x2="170" y2="184" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E7C29A"/>
      <stop offset="1" stop-color="#BD8A5F"/>
    </linearGradient>
    <linearGradient id="steamGrad" x1="84" y1="47" x2="152" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7DDBD"/>
      <stop offset="1" stop-color="#C78953"/>
    </linearGradient>
    <filter id="innerGlow" x="17" y="17" width="206" height="206" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <circle cx="120" cy="120" r="103" fill="url(#bgGrad)"/>
  <circle cx="120" cy="120" r="96" stroke="#C78953" stroke-opacity="0.72" stroke-width="2"/>
  <circle cx="120" cy="120" r="81" stroke="#F2C99A" stroke-opacity="0.25" stroke-width="1.6" stroke-dasharray="3.5 5"/>

