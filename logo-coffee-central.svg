    <path d="M117 76C124 67 126 56 121 47" stroke="url(#steamGrad)" stroke-width="8" stroke-linecap="round"/>
    <path d="M149 73C156 65 157 56 152 48" stroke="url(#steamGrad)" stroke-width="8" stroke-linecap="round"/>

    <path d="M71 112C71 99 81 89 93 89H147C159 89 169 99 169 112V136C169 160 150 179 126 179H114C90 179 71 160 71 136V112Z" fill="url(#cupGrad)"/>
    <path d="M86 103H154" stroke="#613C24" stroke-width="7" stroke-linecap="round"/>
    <path d="M168 113C181 113 191 123 191 136C191 149 181 159 168 159" stroke="#D8A474" stroke-width="11" stroke-linecap="round"/>

    <ellipse cx="120" cy="193" rx="52" ry="8" fill="#0C0704" fill-opacity="0.45"/>
